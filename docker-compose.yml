services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: douban_refugee
      POSTGRES_USER: douban_refugee
      POSTGRES_PASSWORD: douban_refugee
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douban_refugee -d douban_refugee"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://douban_refugee:douban_refugee@postgres:5432/douban_refugee
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - export-storage:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://douban_refugee:douban_refugee@postgres:5432/douban_refugee
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - export-storage:/app/storage/exports
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: dramatiq app.worker.tasks

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres-data:
  export-storage:
  frontend-node-modules:


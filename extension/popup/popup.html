<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoubanRefugee</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span>DoubanRefugee</span>
      </div>
      <div id="health-dot" class="health-dot unknown" title="Checking API connection…"></div>
    </header>

    <!-- Page detection banner -->
    <div id="page-banner" class="page-banner hidden">
      <div id="page-info-text" class="page-info-text"></div>
    </div>

    <!-- Main content -->
    <main class="main">

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-box">
          <div id="stat-items" class="stat-value">0</div>
          <div class="stat-label">Items</div>
        </div>
        <div class="stat-box">
          <div id="stat-pages" class="stat-value">0</div>
          <div class="stat-label">Pages</div>
        </div>
        <div class="stat-box">
          <div id="stat-synced" class="stat-value">—</div>
          <div class="stat-label">Synced</div>
        </div>
      </div>

      <!-- Scraping progress (shown while scraping) -->
      <div id="progress-section" class="progress-section hidden">
        <div class="progress-label">
          <span id="progress-text">Scraping…</span>
          <span id="progress-count" class="progress-count"></span>
        </div>
        <div class="progress-bar-outer">
          <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>

      <!-- Status message -->
      <div id="status-msg" class="status-msg hidden"></div>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-scrape" class="btn btn-primary" disabled>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <span id="btn-scrape-label">Scrape All Pages</span>
        </button>

        <button id="btn-stop" class="btn btn-danger hidden">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Stop
        </button>

        <button id="btn-sync" class="btn btn-accent" disabled>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          <span id="btn-sync-label">Sync to DoubanRefugee</span>
        </button>

        <button id="btn-clear" class="btn btn-ghost" disabled>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          </svg>
          Clear
        </button>
      </div>

      <!-- Last sync info -->
      <div id="last-sync" class="last-sync hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="last-sync-text"></span>
      </div>
    </main>

    <!-- Settings panel (toggled) -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-group">
        <label class="settings-label" for="input-api-url">DoubanRefugee API URL</label>
        <input id="input-api-url" class="settings-input" type="text" placeholder="http://localhost:8000" />
        <p class="settings-hint">The backend URL. Default: http://localhost:8000</p>
      </div>
      <div class="settings-group">
        <label class="settings-label" for="input-user-id">Saved User ID</label>
        <input id="input-user-id" class="settings-input" type="text" placeholder="Auto-assigned on first sync" readonly />
        <p class="settings-hint">UUID assigned by DoubanRefugee on first import.</p>
      </div>
      <button id="btn-save-settings" class="btn btn-primary btn-sm">Save</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a id="btn-open-app" href="#" class="footer-link" target="_blank">Open Web App</a>
      <span class="footer-sep">·</span>
      <button id="btn-settings-toggle" class="footer-link footer-btn">Settings</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>

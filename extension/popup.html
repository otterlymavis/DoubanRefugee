<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DoubanRefugee</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">History transfer</p>
        <h1>DoubanRefugee</h1>
        <p class="hint">Scrape your logged-in Douban movie, book, or music history and turn it into transfer JSON. No backend, no API base URL.</p>
      </header>

      <label>
        Local web app address
        <input id="webAppUrl" type="url" value="http://localhost:3000">
        <span class="field-note">This opens the browser app only. It is not an API or backend URL.</span>
      </label>

      <label>
        Pages to scrape
        <input id="maxPages" type="number" min="1" max="50" value="10">
        <span class="field-note">Start on your own Douban collection/history page. The scraper follows pagination up to this limit.</span>
      </label>

      <label>
        Media type
        <select id="mediaType">
          <option value="movie">Movie</option>
          <option value="book">Book</option>
          <option value="music">Music</option>
        </select>
      </label>

      <div class="actions">
        <button id="scrapeButton" type="button">Scrape history pages</button>
        <button id="extractButton" type="button">Extract current page</button>
        <button id="copyButton" type="button" disabled>Copy JSON</button>
        <button id="downloadButton" type="button" disabled>Download JSON</button>
        <button id="openButton" type="button">Open local app</button>
      </div>

      <section class="status">
        <div id="statusText">Open your Douban collection/history page, then scrape. No API URL needed.</div>
        <pre id="preview" aria-live="polite"></pre>
      </section>

      <footer>
        <a id="webAppLink" href="http://localhost:3000" target="_blank" rel="noreferrer">Open local web app</a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

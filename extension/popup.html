<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DoubanRefugee</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow" data-i18n="historyTransfer">History transfer</p>
        <h1>DoubanRefugee</h1>
        <p class="hint" data-i18n="tagline">Browser session in, local files out.</p>
      </header>

      <label>
        <span data-i18n="localWebAppAddr">Local web app address</span>
        <input id="webAppUrl" type="url" value="http://localhost:3000">
        <span class="field-note" data-i18n="localWebAppNote">Opens the app only. No API.</span>
      </label>

      <div class="cookie-row">
        <button id="copyCookieButton" type="button" class="btn-cookie" data-i18n="copyCookieBtn">🍪 Copy Douban Cookie</button>
        <span id="cookieStatus" class="cookie-note"></span>
      </div>

      <section class="icon-flow" aria-label="Transfer flow">
        <div class="flow-item">
          <span class="flow-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.4-2.8 8.5-7 10-4.2-1.5-7-5.6-7-10V6l7-3z"/><path d="M9 12l2 2 4-5"/></svg></span>
          <b data-i18n="scrapeTitle">Scrape</b>
        </div>
        <div class="flow-item">
          <span class="flow-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 11v6"/><path d="M9 14l3 3 3-3"/></svg></span>
          <b data-i18n="jsonTitle">JSON</b>
        </div>
        <div class="flow-item">
          <span class="flow-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></span>
          <b data-i18n="exportTitle">Export</b>
        </div>
        <div class="flow-item">
          <span class="flow-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg></span>
          <b data-i18n="uploadTitle">Upload</b>
        </div>
      </section>

      <label>
        <span data-i18n="historyPageLimit">History page safety limit</span>
        <input id="maxPages" type="number" min="1" max="200" value="200">
        <span class="field-note" data-i18n="historyPageLimitNote">Reads /collect and /wish.</span>
      </label>

      <label>
        <span data-i18n="mediaType">Media type</span>
        <select id="mediaType">
          <option value="all" data-i18n="allMedia">All media</option>
          <option value="movie" data-i18n="movie">Movie</option>
          <option value="book" data-i18n="book">Book</option>
          <option value="music" data-i18n="music">Music</option>
        </select>
      </label>

      <div class="actions">
        <button id="scrapeButton" type="button" data-i18n="scrapeBtn">Scrape whole history</button>
        <button id="copyButton" type="button" disabled data-i18n="copyBtn">Copy JSON</button>
        <button id="downloadButton" type="button" disabled data-i18n="downloadBtn">Download JSON</button>
        <button id="openButton" type="button" data-i18n="openAppBtn">Open local app</button>
      </div>

      <section class="status-tools">
        <h2 data-i18n="statusBackup">Account backup</h2>
        <p class="field-note" data-i18n="statusNote">Open a Douban profile or section page, pick what to back up, export JSON.</p>
        <fieldset class="backup-grid">
          <legend data-i18n="backupType">Backup sections</legend>
          <label><input type="checkbox" name="backupTypes" value="status" checked> <span data-i18n="backupStatuses">Statuses</span></label>
          <label><input type="checkbox" name="backupTypes" value="diary" checked> <span data-i18n="backupDiaries">Diaries / notes</span></label>
          <label><input type="checkbox" name="backupTypes" value="review" checked> <span data-i18n="backupReviews">Reviews</span></label>
          <label><input type="checkbox" name="backupTypes" value="post" checked> <span data-i18n="backupPosts">Posts / discussions</span></label>
          <label><input type="checkbox" name="backupTypes" value="reply" checked> <span data-i18n="backupReplies">Replies</span></label>
          <label><input type="checkbox" name="backupTypes" value="album" checked> <span data-i18n="backupAlbums">Albums / photos</span></label>
          <label><input type="checkbox" name="backupTypes" value="doulist" checked> <span data-i18n="backupDoulists">Doulists</span></label>
          <label><input type="checkbox" name="backupTypes" value="profile" checked> <span data-i18n="backupProfile">Profile / social</span></label>
          <label><input type="checkbox" name="backupTypes" value="relationship" checked> <span data-i18n="backupRelationships">Follows / followers</span></label>
          <label><input type="checkbox" name="backupTypes" value="event" checked> <span data-i18n="backupEvents">Events</span></label>
        </fieldset>
        <div class="page-range">
          <label>
            <span data-i18n="fromPage">From page</span>
            <input id="statusStartPage" type="number" min="1" value="1">
          </label>
          <label>
            <span data-i18n="toPage">To page</span>
            <input id="statusEndPage" type="number" min="1" value="1">
          </label>
        </div>
        <div class="actions">
          <button id="statusScrapeButton" type="button" data-i18n="backupStatusesBtn">Backup account data</button>
          <button id="statusCopyButton" type="button" disabled data-i18n="copyStatusBtn">Copy backup JSON</button>
          <button id="statusDownloadButton" type="button" disabled data-i18n="downloadStatusBtn">Download backup JSON</button>
          <button id="statusCancelButton" type="button" disabled data-i18n="cancelBtn">Cancel</button>
        </div>
        <progress id="statusProgress" max="100" value="0"></progress>
      </section>

      <section class="status">
        <div id="statusText" data-i18n="statusIdle">Open Douban, choose type, scrape. No passwords.</div>
        <pre id="preview" aria-live="polite"></pre>
      </section>

      <footer>
        <a id="webAppLink" href="http://localhost:3000" target="_blank" rel="noreferrer" data-i18n="footerLink">Open local web app</a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>

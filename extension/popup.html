<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DoubanRefugee</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">History transfer</p>
        <h1>DoubanRefugee</h1>
        <p class="hint">Scrape a Douban user's movie pages: watched films with ratings/reviews plus wanted films for a Letterboxd watchlist.</p>
      </header>

      <label>
        Local web app address
        <input id="webAppUrl" type="url" value="http://localhost:3000">
        <span class="field-note">This opens the browser app only. It is not an API or backend URL.</span>
      </label>

      <label>
        History page safety limit
        <input id="maxPages" type="number" min="1" max="200" value="200">
        <span class="field-note">Start on a Douban movie user page. The scraper reads both /collect and /wish and follows pagination until each section ends or this limit is reached.</span>
      </label>

      <label>
        Media type
        <select id="mediaType">
          <option value="movie">Movie</option>
          <option value="book">Book</option>
          <option value="music">Music</option>
        </select>
      </label>

      <div class="actions">
        <button id="scrapeButton" type="button">Scrape whole history</button>
        <button id="copyButton" type="button" disabled>Copy JSON</button>
        <button id="downloadButton" type="button" disabled>Download JSON</button>
        <button id="openButton" type="button">Open local app</button>
      </div>

      <section class="status">
        <div id="statusText">Open your Douban movie user page, then scrape watched movies and watchlist. No API URL needed.</div>
        <pre id="preview" aria-live="polite"></pre>
      </section>

      <footer>
        <a id="webAppLink" href="http://localhost:3000" target="_blank" rel="noreferrer">Open local web app</a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
